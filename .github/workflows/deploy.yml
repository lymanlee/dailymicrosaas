name: Manual Deploy to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running the fallback deploy?"
        required: false
        default: "manual-fallback"

permissions:
  contents: read
  deployments: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Optional public subscribe entry used only for this manual fallback build.
      PUBLIC_EMAIL_SUBSCRIBE_URL: ${{ vars.PUBLIC_EMAIL_SUBSCRIBE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Explain fallback path
        run: |
          echo "This workflow is a manual fallback deploy only." >> "$GITHUB_STEP_SUMMARY"
          echo "Primary production deploys come from Cloudflare Pages Git integration." >> "$GITHUB_STEP_SUMMARY"
          echo "Reason: ${{ github.event.inputs.reason || 'manual-fallback' }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=dailymicrosaas
