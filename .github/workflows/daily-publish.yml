name: Daily Content Publish

on:
  schedule:
    # 北京时间 08:05
    - cron: "5 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "指定运行日期 (YYYY-MM-DD)，默认今天"
        required: false
        default: ""
      skip_trends:
        description: "跳过 Google Trends，使用缓存"
        required: false
        type: boolean
        default: false
      skip_community:
        description: "跳过社区扫描，使用缓存"
        required: false
        type: boolean
        default: false
      skip_serp:
        description: "跳过 SERP 主动采集"
        required: false
        type: boolean
        default: false
      max_serp_keywords:
        description: "主动采集 SERP 的最大关键词数"
        required: false
        default: "20"
      min_score:
        description: "最低发布分数阈值"
        required: false
        default: "25"
      dry_run:
        description: "只跑预览，不提交推送"
        required: false
        type: boolean
        default: false
      fail_on_quality_warning:
        description: "严格模式：内容质量 warning 也阻止发布"
        required: false
        type: boolean
        default: false
      fail_on_soft_discovery_warning:
        description: "严格模式：普通 discovery 告警也阻止发布"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-content-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PUBLISH_FAILURE_WEBHOOK_URL: ${{ secrets.PUBLISH_FAILURE_WEBHOOK_URL }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare runtime paths
        shell: bash
        env:
          INPUT_DATE: ${{ github.event.inputs.date || '' }}
        run: |
          set -euo pipefail
          mkdir -p pipeline/logs pipeline/reports

          RUN_DATE="${INPUT_DATE:-$(date -u +%F)}"
          RUN_STAMP="$(date -u +%Y%m%dT%H%M%SZ)"

          echo "RUN_DATE=$RUN_DATE" >> "$GITHUB_ENV"
          echo "RUN_URL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=daily-publish-${{ github.run_id }}" >> "$GITHUB_ENV"
          echo "LOG_FILE=pipeline/logs/daily_publish_${RUN_DATE}_${RUN_STAMP}.log" >> "$GITHUB_ENV"
          echo "SUMMARY_JSON=pipeline/logs/daily_publish_${RUN_DATE}_${RUN_STAMP}.summary.json" >> "$GITHUB_ENV"
          echo "SUMMARY_MD=pipeline/logs/daily_publish_${RUN_DATE}_${RUN_STAMP}.summary.md" >> "$GITHUB_ENV"

      - name: Run publish pipeline
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_DATE: ${{ github.event.inputs.date || '' }}
          INPUT_SKIP_TRENDS: ${{ github.event.inputs.skip_trends || 'false' }}
          INPUT_SKIP_COMMUNITY: ${{ github.event.inputs.skip_community || 'false' }}
          INPUT_SKIP_SERP: ${{ github.event.inputs.skip_serp || 'false' }}
          INPUT_MAX_SERP_KEYWORDS: ${{ github.event.inputs.max_serp_keywords || '20' }}
          INPUT_MIN_SCORE: ${{ github.event.inputs.min_score || '25' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_FAIL_ON_QUALITY_WARNING: ${{ github.event.inputs.fail_on_quality_warning || 'false' }}
          INPUT_FAIL_ON_SOFT_DISCOVERY_WARNING: ${{ github.event.inputs.fail_on_soft_discovery_warning || 'false' }}
        run: |
          set -euo pipefail

          CMD=(python3 scripts/run_daily_publish.py --mode overwrite --branch main --summary-json "$SUMMARY_JSON" --summary-md "$SUMMARY_MD")

          if [ -n "$INPUT_DATE" ]; then
            CMD+=(--date "$INPUT_DATE")
          fi

          if [ "$INPUT_SKIP_TRENDS" = "true" ]; then
            CMD+=(--skip-trends)
          fi

          if [ "$INPUT_SKIP_COMMUNITY" = "true" ]; then
            CMD+=(--skip-community)
          fi

          if [ "$INPUT_SKIP_SERP" = "true" ]; then
            CMD+=(--skip-serp)
          fi

          if [ -n "$INPUT_MAX_SERP_KEYWORDS" ]; then
            CMD+=(--max-serp-keywords "$INPUT_MAX_SERP_KEYWORDS")
          fi

          if [ -n "$INPUT_MIN_SCORE" ]; then
            CMD+=(--min-score "$INPUT_MIN_SCORE")
          fi

          if [ "$INPUT_FAIL_ON_QUALITY_WARNING" = "true" ]; then
            CMD+=(--fail-on-quality-warning)
          fi

          if [ "$INPUT_FAIL_ON_SOFT_DISCOVERY_WARNING" = "true" ]; then
            CMD+=(--fail-on-soft-discovery-warning)
          fi

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            CMD+=(--dry-run --no-build)
          else
            CMD+=(--commit --push)
          fi

          printf 'Running:'
          printf ' %q' "${CMD[@]}"
          printf '\n'

          "${CMD[@]}" 2>&1 | tee "$LOG_FILE"

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          if-no-files-found: warn
          path: |
            ${{ env.LOG_FILE }}
            ${{ env.SUMMARY_JSON }}
            ${{ env.SUMMARY_MD }}
            pipeline/reports/opportunity_report_*.json
            pipeline/reports/opportunity_report_*.txt

      - name: Publish workflow diagnostics
        if: always()
        env:
          SUMMARY_JSON: ${{ env.SUMMARY_JSON }}
          SUMMARY_MD: ${{ env.SUMMARY_MD }}
          LOG_FILE: ${{ env.LOG_FILE }}
          RUN_URL: ${{ env.RUN_URL }}
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def escape_annotation(text: str) -> str:
              return str(text).replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")

          summary = {}
          summary_path = Path(os.environ["SUMMARY_JSON"])
          if summary_path.exists():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))

          status = summary.get("status", "missing_summary")
          candidate = summary.get("candidate") or {}
          report_summary = summary.get("report_summary") or {}
          warnings = list(summary.get("warnings") or [])
          errors = list(summary.get("errors") or [])
          paths = summary.get("paths") or {}

          summary_lines = [
              "## Workflow Diagnostics",
              "",
              f"- Run URL: {os.environ['RUN_URL']}",
              f"- Artifact: `{os.environ['ARTIFACT_NAME']}`",
              f"- Status: `{status}`",
              f"- Candidate keyword: `{candidate.get('keyword') or '-'}`",
              f"- Candidate score: `{candidate.get('score') or '-'}`",
              f"- Report worth_it count: `{report_summary.get('worth_it', '-')}`",
              f"- Log file: `{os.environ['LOG_FILE']}`",
              f"- Summary JSON: `{os.environ['SUMMARY_JSON']}`",
              f"- Summary Markdown: `{os.environ['SUMMARY_MD']}`",
          ]

          generated_markdown = paths.get("generated_markdown")
          if generated_markdown:
              summary_lines.append(f"- Generated Markdown: `{generated_markdown}`")

          summary_lines.extend(["", "### Top warnings"])
          if warnings:
              for warning in warnings[:10]:
                  summary_lines.append(f"- ⚠️ {warning}")
          else:
              summary_lines.append("- None")

          summary_lines.extend(["", "### Top errors"])
          if errors:
              for error in errors[:10]:
                  summary_lines.append(f"- ❌ {error}")
          else:
              summary_lines.append("- None")

          github_step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if github_step_summary:
              with Path(github_step_summary).open("a", encoding="utf-8") as handle:
                  handle.write("\n" + "\n".join(summary_lines) + "\n")

          print(f"::notice::daily-publish status={status}; artifact={os.environ['ARTIFACT_NAME']}")
          if not summary:
              print("::warning::daily-publish 未生成 summary.json，请直接检查安装或执行前置步骤")

          for warning in warnings[:20]:
              print(f"::warning::{escape_annotation(warning)}")
          for error in errors[:20]:
              print(f"::error::{escape_annotation(error)}")
          PY

      - name: Notify failure webhook
        if: failure() && env.PUBLISH_FAILURE_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          WEBHOOK_URL: ${{ env.PUBLISH_FAILURE_WEBHOOK_URL }}
          SUMMARY_JSON: ${{ env.SUMMARY_JSON }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ env.RUN_URL }}
          LOG_FILE: ${{ env.LOG_FILE }}
          SUMMARY_MD: ${{ env.SUMMARY_MD }}
          ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib import request

          summary = {}
          summary_path = Path(os.environ["SUMMARY_JSON"])
          if summary_path.exists():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))

          payload = {
              "event": "daily_publish_failed",
              "repository": os.environ["REPOSITORY"],
              "run_id": os.environ["RUN_ID"],
              "run_number": os.environ["RUN_NUMBER"],
              "branch": os.environ["BRANCH"],
              "actor": os.environ["ACTOR"],
              "run_url": os.environ["RUN_URL"],
              "status": summary.get("status", "failed"),
              "date": summary.get("date"),
              "candidate": summary.get("candidate"),
              "warnings": summary.get("warnings", []),
              "errors": summary.get("errors", []),
              "summary_json": os.environ["SUMMARY_JSON"],
              "summary_md": os.environ["SUMMARY_MD"],
              "log_file": os.environ["LOG_FILE"],
              "artifact_name": os.environ["ARTIFACT_NAME"],
          }

          req = request.Request(
              os.environ["WEBHOOK_URL"],
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with request.urlopen(req, timeout=20) as response:
              print(f"Webhook notified: {response.status}")
          PY
